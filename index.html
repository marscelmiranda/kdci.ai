    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What exactly counts as an 'AI agent' for monitoring purposes?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Any automated system using a large language model (LLM) to handle customer interactions, internal queries, data processing, or decision support — including chatbots, voice agents, email bots, support agents on Intercom or Zendesk, and custom-built LLM workflows."
      }
    },
    {
      "@type": "Question",
      "name": "Can KDCI build custom AI agents for our specific workflows?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. Our AI engineering team designs and deploys purpose-built agents for tasks like automated research, document classification, outreach sequencing, data extraction, report generation, and first-response triage. Every agent is built to your specific data schema and approval requirements."
      }
    },
    {
      "@type": "Question",
      "name": "Do you need admin access to our AI platforms?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "We need read access to your agent configurations and, for optimization, the ability to update prompt templates. We document every change and require client approval for any structural modifications to an agent's logic."
      }
    },
    {
      "@type": "Question",
      "name": "What AI platforms and helpdesks do you support?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "We support agents built on OpenAI, Anthropic, Google Gemini, and most LLM platforms. For integrations, we work with Intercom, Zendesk, Freshdesk, HubSpot, Salesforce, and custom API-based setups."
      }
    },
    {
      "@type": "Question",
      "name": "How is sensitive customer data handled during monitoring?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "All monitoring is conducted on anonymized or aggregated performance data wherever possible. If transcript review is required, we follow your data handling policy and can operate under NDA and DPA agreements."
      }
    }
  ]
}
